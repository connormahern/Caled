<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title> Caled - Base </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar navbar-expand-lg"  style="background-color: #5288fb;">
        <div class="container-fluid">
            <div class="navbar-brand" href="{{ url_for('auth.login') }}" > 
                <img src = "static/graphics/Caled-Logo.png" width="50px" style="padding: 5px;">
            </div>

            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav">
                    {% if not current_user.is_authenticated %}
                    <a href="{{ url_for('auth.login') }}" class="nav-item nav-link" style="color: white;"> Login </a>
                    <a href="{{ url_for('auth.signup') }}" class="nav-item nav-link" style="color: white;"> Sign Up </a>
                    {% endif %}

                    {% if current_user.is_authenticated %}
                    <a href="{{ url_for('main.index') }}" class="nav-item nav-link" style="color: white;"> Main Page </a>
                    <a href="{{ url_for('main.courses') }}" class="nav-item nav-link" style="color: white;"> Courses </a>
                    <a href="{{ url_for('main.messages') }}" class="nav-item nav-link" style="color: white;"> Messages </a>
                    <a href="{{ url_for('auth.logout') }}" class="nav-item nav-link" style="color: white;"> Logout </a>
                    {% endif %}
                </div>
            </div>
        </div> 
    </nav>

    <div class="container">
        {% block content %}
        
        {% endblock %}
    </div>

</body>
</html>
