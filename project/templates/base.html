<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title> Caled - Base </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">
</head>

<body>
    

        <div class="navbar navbar-expand" style="background-color: #5288fb;">
            <div class="container-fluid">
                
                <div class="nav-brand" href="{{ url_for('auth.login') }}" > 
                    <img src = "static/graphics/Caled-Logo.png" width="50px" style="padding: 5px;">
                </div>

                <div class="collapse navbar-collapse">
                    <ul class="navbar-nav me-auto">
                        {% if not current_user.is_authenticated %}
                        <ul class="nav-item"></div>
                            <a href="{{ url_for('auth.login') }}" class="nav-link">
                                Login
                            </a>
                        </ul>
                        <ul class="nav-item"></div>
                            <a href="{{ url_for('auth.signup') }}" class="nav-link">
                                Sign Up
                            </a>
                        </ul>
                        {% endif %}
                        {% if current_user.is_authenticated %}
                        <ul class="nav-item"></div>
                            <a href="{{ url_for('main.index') }}" class="nav-link">
                                MainPage
                            </a>
                        </ul>

                        <ul class="nav-item"></div>
                            <a href="{{ url_for('main.courses') }}" class="nav-link">
                                Courses
                            </a>
                        </ul>

                        <ul class="nav-item"></div>
                            <a href="{{ url_for('main.messages') }}" class="nav-link">
                                Messages
                            </a>
                        </ul>
                        <ul class="nav-item"></div>
                            <a href="{{ url_for('auth.logout') }}" class="nav-link">
                                Logout
                            </a>
                        </ul>
                        {% endif %}
                    </ul>
                </div>

            </div>
            
        </div>

        <div class="hero-body" style="background-color: white;" >
            <div class="container has-text-centered">
               {% block content %}
               {% endblock %}
            </div>
        </div>
    
</body>

</html>
